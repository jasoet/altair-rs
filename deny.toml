[graph]
all-features = true

[advisories]
db-path = "~/.cargo/advisory-db"
db-urls = ["https://github.com/rustsec/advisory-db"]
yanked = "deny"
ignore = [
  # RSA timing sidechannel (Marvin Attack). Pulled by sqlx-mysql for
  # MySQL auth. No fix released upstream; the rsa crate has no
  # constant-time alternative. Mitigation: deploy MySQL on a private
  # network. Re-evaluate when rsa crate ships a patched release.
  "RUSTSEC-2023-0071",
  # rustls-pemfile unmaintained. Pulled transitively; no exploit, just
  # archived repo. Replace when downstream deps migrate to rustls-pki-types.
  "RUSTSEC-2025-0134",
  # tokio-tar PAX header parsing. Only affects testcontainers' image-layer
  # parsing (trusted Docker registries), not runtime DB use.
  "RUSTSEC-2025-0111",
  # backoff unmaintained. Pulled transitively by temporalio-sdk-core for
  # rate-limited retries; no exploit, just archived. Replace when SDK migrates.
  "RUSTSEC-2025-0012",
  # instant unmaintained. Transitive dep of backoff and other crates;
  # no exploit, archived in favour of web-time.
  "RUSTSEC-2024-0384",
]

[licenses]
allow = [
  "MIT",
  "MIT-0",
  "Apache-2.0",
  "Apache-2.0 WITH LLVM-exception",
  "BSD-2-Clause",
  "BSD-3-Clause",
  "ISC",
  "Unicode-3.0",
  "Unicode-DFS-2016",
  "Zlib",
  "0BSD",
  "MPL-2.0",
  "CDLA-Permissive-2.0",
  "CC0-1.0",
  "bzip2-1.0.6",
]
confidence-threshold = 0.9

[bans]
multiple-versions = "warn"
wildcards = "deny"
# Permit wildcard versions for path-only dependencies. We deliberately
# strip version pins from sibling altair-* dev-deps (see release-plz.toml
# and the per-crate Cargo.toml comments) so cargo publish can sequence
# the workspace through a major-bump without the chicken-and-egg
# resolution failure. Those path-only deps are stripped at publish time
# anyway — never reach crates.io with a wildcard.
allow-wildcard-paths = true

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
